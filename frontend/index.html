<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Auth Screen -->
    <div id="auth-screen" class="screen active">
        <div class="auth-container">
            <div class="auth-header">
                <div class="logo">✦</div>
                <h1>Task Manager</h1>
                <p class="subtitle">Organize your work, one task at a time</p>
            </div>

            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary" id="login-btn">Sign In</button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form hidden" onsubmit="handleRegister(event)">
                <div class="input-group">
                    <label for="reg-username">Username</label>
                    <input type="text" id="reg-username" placeholder="johndoe" required>
                </div>
                <div class="input-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" placeholder="Min 6 characters" required minlength="6">
                </div>
                <button type="submit" class="btn-primary" id="reg-btn">Create Account</button>
            </form>

            <div id="auth-error" class="error-msg hidden"></div>
        </div>
    </div>

    <!-- Dashboard Screen -->
    <div id="dashboard-screen" class="screen">
        <nav class="navbar">
            <div class="nav-left">
                <span class="nav-logo">✦</span>
                <h2>My Tasks</h2>
            </div>
            <div class="nav-right">
                <span id="user-email" class="user-badge"></span>
                <button class="btn-logout" onclick="handleLogout()">Logout</button>
            </div>
        </nav>

        <main class="dashboard-content">
            <!-- Add Task -->
            <div class="add-task-card">
                <form onsubmit="handleCreateTask(event)" class="add-task-form">
                    <div class="add-task-inputs">
                        <input type="text" id="task-title" placeholder="Task title..." required>
                        <input type="text" id="task-desc" placeholder="Description (optional)">
                    </div>
                    <button type="submit" class="btn-add">+ Add Task</button>
                </form>
            </div>

            <!-- Stats -->
            <div class="stats-bar">
                <div class="stat">
                    <span class="stat-num" id="stat-total">0</span>
                    <span class="stat-label">Total</span>
                </div>
                <div class="stat">
                    <span class="stat-num" id="stat-done">0</span>
                    <span class="stat-label">Done</span>
                </div>
                <div class="stat">
                    <span class="stat-num" id="stat-pending">0</span>
                    <span class="stat-label">Pending</span>
                </div>
            </div>

            <!-- Task List -->
            <div id="task-list" class="task-list">
                <div class="empty-state" id="empty-state">
                    <div class="empty-icon">📋</div>
                    <p>No tasks yet. Add one above!</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>

    <script src="script.js"></script>
</body>
</html>
